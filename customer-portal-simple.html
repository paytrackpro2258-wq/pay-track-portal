<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pay Track Pro - Customer Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .content {
            padding: 30px;
        }

        .search-section {
            margin-bottom: 20px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group input {
            width: 100%;
            padding: 15px 50px 15px 20px;
            border: 2px solid #e1e8ed;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .input-group .icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: #667eea;
            font-size: 18px;
        }

        .btn-primary {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        .loading i {
            font-size: 24px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #c33;
        }

        .success {
            background: #efe;
            color: #3a3;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-left: 4px solid #3a3;
        }

        .customer-info {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid #e9ecef;
        }

        .customer-info h3 {
            color: #333;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            color: #666;
            font-weight: 500;
        }

        .info-value {
            color: #333;
            font-weight: 600;
        }

        .pending-amount {
            color: #d4ac0d;
            font-size: 18px;
            font-weight: 700;
        }

        .advance-amount {
            color: #28a745;
            font-weight: 600;
        }

        .invoices-section {
            margin-top: 20px;
        }

        .invoices-section h4 {
            color: #333;
            margin-bottom: 15px;
            font-size: 16px;
        }

        .invoice-item {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
        }

        .invoice-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .invoice-id {
            font-weight: 600;
            color: #333;
        }

        .invoice-amount {
            font-weight: 700;
            color: #d4ac0d;
        }

        .invoice-date {
            color: #666;
            font-size: 14px;
        }

        .year-wise-pending {
            margin-top: 15px;
            padding: 15px;
            background: white;
            border-radius: 8px;
            border: 1px solid #e9ecef;
        }

        .year-wise-pending h4 {
            color: #333;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .year-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            padding: 5px 0;
        }

        .year-item.current-year {
            color: #b91c1c;
            font-weight: 700;
        }

        .year-item.other-year {
            color: #666;
            font-weight: normal;
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .no-data i {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .footer {
            text-align: center;
            padding: 20px;
            color: #666;
            font-size: 12px;
            border-top: 1px solid #e9ecef;
        }

        .last-updated {
            text-align: center;
            font-size: 11px;
            color: #999;
            margin-top: 10px;
        }

        @media (max-width: 480px) {
            .container {
                margin: 10px;
            }
            
            .header {
                padding: 20px;
            }
            
            .content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1><i class="fas fa-chart-line"></i> Pay Track Pro</h1>
            <p>Customer Account Portal</p>
        </div>

        <div class="content">
            <!-- Search Section Only -->
            <div class="search-section">
                <div class="input-group">
                    <input 
                        type="tel" 
                        id="phoneInput" 
                        placeholder="Enter your phone number"
                        maxlength="10"
                        pattern="[0-9]*"
                    >
                    <i class="fas fa-phone icon"></i>
                </div>
                <button class="btn-primary" id="searchBtn" onclick="searchCustomer()">
                    <i class="fas fa-search"></i> Check Account
                </button>
            </div>

            <div id="loadingSection" class="loading" style="display: none;">
                <i class="fas fa-spinner"></i>
                <p>Loading your information...</p>
            </div>

            <div id="messageSection" style="display: none;"></div>

            <div id="resultSection" style="display: none;">
                <!-- Customer data will be displayed here -->
            </div>

            <div class="last-updated" id="lastUpdated" style="display: none;">
                Last updated: <span id="updateTime">Never</span>
            </div>
        </div>

        <div class="footer">
            <p>© 2026 Pay Track Pro | Customer Portal</p>
        </div>
    </div>

    <script>
        let customerData = [];
        const DATA_URL = 'https://paytrackpro2258-wq.github.io/pay-track-portal/customer-data.json';

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            const phoneInput = document.getElementById('phoneInput');
            
            // Allow only numbers
            if (phoneInput) {
                phoneInput.addEventListener('input', function(e) {
                    this.value = this.value.replace(/[^0-9]/g, '');
                });
                
                // Allow Enter key to search
                phoneInput.addEventListener('keypress', function(e) {
                    if (e.key === 'Enter') {
                        searchCustomer();
                    }
                });
            }

            // Load customer data automatically
            loadCustomerData();
        });

        // Load customer data from GitHub
        async function loadCustomerData() {
            try {
                showLoading('Loading customer data...');
                const response = await fetch(DATA_URL);
                
                if (!response.ok) {
                    throw new Error('Failed to load customer data');
                }
                
                customerData = await response.json();
                
                if (!Array.isArray(customerData)) {
                    throw new Error('Invalid data format');
                }
                
                hideLoading();
                showMessage(`Loaded ${customerData.length} customer records`, 'success');
                
                // Auto-hide success message after 3 seconds
                setTimeout(hideMessage, 3000);
                
            } catch (error) {
                console.error('Error loading customer data:', error);
                hideLoading();
                showMessage('Unable to load customer data. Please try again later.', 'error');
            }
        }

        // Search customer by phone number
        function searchCustomer() {
            const phone = document.getElementById('phoneInput').value.trim();
            
            if (!phone) {
                showMessage('Please enter your phone number', 'error');
                return;
            }
            
            if (phone.length !== 10) {
                showMessage('Please enter a valid 10-digit phone number', 'error');
                return;
            }
            
            showLoading('Searching for your account...');
            hideMessage();
            hideResult();
            
            setTimeout(() => {
                const customer = findCustomerByPhone(phone);
                
                if (customer) {
                    displayCustomerInfo(customer);
                } else {
                    showMessage('No account found with this phone number. Please contact support.', 'error');
                }
                hideLoading();
            }, 500);
        }

        // Find customer by phone number
        function findCustomerByPhone(phone) {
            return customerData.find(customer => 
                String(customer.phone || '').replace(/\D/g, '') === phone
            );
        }

        // Display customer information
        function displayCustomerInfo(customer) {
            const resultSection = document.getElementById('resultSection');
            
            // Calculate pending amounts
            const pendingAmount = parseFloat(customer.pendingAmount || 0);
            const advanceAmount = parseFloat(customer.advanceAmount || 0);
            const hasPending = pendingAmount > 0;
            
            // Parse year-wise pending if available
            let yearWiseHtml = '';
            if (customer.yearWisePending && Object.keys(customer.yearWisePending).length > 0) {
                yearWiseHtml = '<div class="year-wise-pending"><h4>Year-wise Breakdown:</h4>';
                
                Object.entries(customer.yearWisePending).forEach(([year, amount]) => {
                    const isCurrentYear = year.includes(new Date().getFullYear().toString());
                    yearWiseHtml += `
                        <div class="year-item ${isCurrentYear ? 'current-year' : 'other-year'}">
                            <span>${year}</span>
                            <span>₹${parseFloat(amount).toFixed(2)}</span>
                        </div>
                    `;
                });
                
                yearWiseHtml += '</div>';
            }
            
            // Parse invoices if available
            let invoicesHtml = '';
            if (customer.invoices && customer.invoices.length > 0) {
                invoicesHtml = '<div class="invoices-section"><h4>Pending Invoices:</h4>';
                
                customer.invoices.forEach(invoice => {
                    invoicesHtml += `
                        <div class="invoice-item">
                            <div class="invoice-header">
                                <span class="invoice-id">#${invoice.id || 'N/A'}</span>
                                <span class="invoice-amount">₹${parseFloat(invoice.amount || 0).toFixed(2)}</span>
                            </div>
                            <div class="invoice-date">Date: ${invoice.date || 'N/A'}</div>
                        </div>
                    `;
                });
                
                invoicesHtml += '</div>';
            }
            
            resultSection.innerHTML = `
                <div class="customer-info">
                    <h3><i class="fas fa-user"></i> ${customer.name || 'N/A'}</h3>
                    <div class="info-row">
                        <span class="info-label">Phone:</span>
                        <span class="info-value">${customer.phone || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Address:</span>
                        <span class="info-value">${customer.address || 'N/A'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Pending Amount:</span>
                        <span class="info-value pending-amount">₹${pendingAmount.toFixed(2)} ${hasPending ? '(Pending)' : '(Clear)'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">Advance Paid:</span>
                        <span class="info-value advance-amount">₹${advanceAmount.toFixed(2)} ${advanceAmount > 0 ? '(Advance)' : ''}</span>
                    </div>
                </div>
                
                ${yearWiseHtml}
                ${invoicesHtml}
                
                <div style="text-align: center; margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px;">
                    <p style="color: #666; font-size: 14px;">
                        <i class="fas fa-info-circle"></i> 
                        For payment details or disputes, please contact our office.
                    </p>
                </div>
            `;
            
            showResult();
            updateLastRefreshTime();
        }

        // Show loading state
        function showLoading(message = 'Loading...') {
            const loadingSection = document.getElementById('loadingSection');
            loadingSection.innerHTML = `
                <i class="fas fa-spinner"></i>
                <p>${message}</p>
            `;
            loadingSection.style.display = 'block';
        }

        // Hide loading state
        function hideLoading() {
            document.getElementById('loadingSection').style.display = 'none';
        }

        // Show message
        function showMessage(message, type = 'info') {
            const messageSection = document.getElementById('messageSection');
            messageSection.innerHTML = `<div class="${type}">${message}</div>`;
            messageSection.style.display = 'block';
        }

        // Hide message
        function hideMessage() {
            document.getElementById('messageSection').style.display = 'none';
        }

        // Show result
        function showResult() {
            document.getElementById('resultSection').style.display = 'block';
        }

        // Hide result
        function hideResult() {
            document.getElementById('resultSection').style.display = 'none';
        }

        // Update last refresh time
        function updateLastRefreshTime() {
            const now = new Date();
            document.getElementById('updateTime').textContent = now.toLocaleTimeString();
            document.getElementById('lastUpdated').style.display = 'block';
        }
    </script>
</body>
</html>
